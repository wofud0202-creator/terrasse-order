<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="발주체크 본점">
<meta name="theme-color" content="#ffffff">
<title>La Terrasse 본점 발주 체크</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0f0ed;
  --txt:#1a1a1a;--txt2:#888;--txt3:#bbb;
  --border:#e8e8e5;--border2:#d0d0cc;
  --purple:#534AB7;
  --red:#E24B4A;--red-light:#FCEBEB;--red-dark:#A32D2D;
  --green:#639922;
  --r-md:8px;--r-lg:14px;--r-xl:20px;
}
html,body{height:100%;background:var(--bg2);font-family:-apple-system,'SF Pro Display','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;}
.wrap{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* TOPBAR */
.topbar{background:var(--bg);padding:16px 20px 0;border-bottom:0.5px solid var(--border);}
.topbar-title{font-size:20px;font-weight:600;color:var(--txt);letter-spacing:-0.4px;}
.topbar-sub{font-size:13px;color:var(--txt2);margin-top:3px;}
.prog-row{display:flex;align-items:center;gap:10px;padding:12px 0 10px;}
.prog-bar{flex:1;height:3px;background:var(--bg3);border-radius:2px;}
.prog-fill{height:3px;border-radius:2px;background:var(--purple);transition:width 0.3s;}
.prog-lbl{font-size:12px;color:var(--txt2);white-space:nowrap;}

/* TAB BAR */
.tab-bar{display:flex;background:var(--bg);border-bottom:0.5px solid var(--border);}
.tbtab{flex:1;padding:10px 0;text-align:center;font-size:13px;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;}
.tbtab.on{color:var(--purple);border-bottom-color:var(--purple);font-weight:500;}

/* STAT */
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--border);gap:0.5px;}
.stat-cell{background:var(--bg);padding:13px 0;text-align:center;}
.stat-n{font-size:24px;font-weight:600;color:var(--txt);letter-spacing:-0.5px;}
.stat-n.red{color:var(--red);}
.stat-l{font-size:11px;color:var(--txt2);margin-top:2px;}

/* CHIPS */
.chips{background:var(--bg);padding:10px 16px;display:flex;gap:6px;overflow-x:auto;border-bottom:0.5px solid var(--border);}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--txt2);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.chip.on{background:var(--purple);color:#fff;border-color:var(--purple);}
.chip.alert-on{background:var(--red-light);color:var(--red-dark);border-color:var(--red);}
.nc{display:inline-block;padding:0 5px;font-size:11px;border-radius:10px;margin-left:2px;}
.chip.on .nc{background:rgba(255,255,255,0.25);color:#fff;}
.chip:not(.on) .nc{background:var(--red-light);color:var(--red-dark);}

/* CONTENT PANELS */
.panel{display:none;flex:1;padding-bottom:120px;}
.panel.on{display:block;}

/* CHECK ROWS */
.sec{margin-top:8px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 4px;}
.sec-title{font-size:12px;font-weight:600;color:var(--txt2);letter-spacing:0.05em;text-transform:uppercase;}
.sec-meta{font-size:12px;color:var(--txt2);}
.sec-need{color:var(--red);font-weight:600;}

.row{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 20px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background 0.08s;}
.row:active{background:var(--bg2);}
.row.is-ok .row-main{opacity:0.32;}
.row-main{display:flex;align-items:center;gap:14px;padding:15px 0 13px;}
.row-info{flex:1;min-width:0;}
.row-name{font-size:15px;font-weight:500;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.row-hint{font-size:12px;color:var(--txt2);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dot{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;flex-shrink:0;transition:background 0.15s,border-color 0.15s;position:relative;}
.dot.need{background:var(--red);border-color:var(--red);}
.dot.ok{background:var(--green);border-color:var(--green);}
.dot.ok::after{content:"";position:absolute;left:7px;top:4px;width:6px;height:10px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg);}

/* QTY */
.qty-expand{overflow:hidden;max-height:0;transition:max-height 0.2s ease;}
.qty-expand.open{max-height:64px;}
.qty-inner{display:flex;align-items:center;padding:0 0 14px;}
.qty-avg{font-size:12px;color:var(--txt2);}
.qty-ctrl{display:flex;align-items:center;gap:12px;margin-left:auto;}
.qty-btn{width:34px;height:34px;border-radius:50%;border:0.5px solid var(--border2);background:var(--bg2);color:var(--txt);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.qty-btn:active{transform:scale(0.88);}
.qty-val{font-size:17px;font-weight:600;color:var(--purple);min-width:26px;text-align:center;}

/* ADMIN PANEL */
.admin-zone-tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;background:var(--bg);border-bottom:0.5px solid var(--border);}
.admin-zone-tabs::-webkit-scrollbar{display:none;}
.azt{flex-shrink:0;font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;color:var(--txt2);cursor:pointer;white-space:nowrap;}
.azt.on{background:var(--purple);color:#fff;border-color:var(--purple);}

.admin-add-bar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:12px 16px;display:flex;gap:8px;}
.admin-add-bar input{flex:1;font-size:14px;padding:9px 12px;border:0.5px solid var(--border2);border-radius:var(--r-md);background:var(--bg2);color:var(--txt);outline:none;}
.admin-add-bar input:focus{border-color:var(--purple);}
.add-btn{padding:9px 16px;border-radius:var(--r-md);border:none;background:var(--purple);color:#fff;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}

.admin-item{background:var(--bg);border-bottom:0.5px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;}
.admin-item-info{flex:1;min-width:0;}
.admin-item-name{font-size:14px;font-weight:500;color:var(--txt);}
.admin-item-hint{font-size:12px;color:var(--txt2);margin-top:2px;}
.admin-actions{display:flex;gap:6px;flex-shrink:0;}
.a-btn{padding:6px 12px;border-radius:var(--r-md);border:0.5px solid var(--border2);background:var(--bg2);color:var(--txt2);font-size:12px;cursor:pointer;}
.a-btn.del{color:var(--red);border-color:var(--red-light);}

/* BOTTOM */
.bottom{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);padding:10px 16px 28px;max-width:430px;margin:0 auto;}
.hint-row{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:6px;}
.hint-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt2);}
.hint-dot{width:10px;height:10px;border-radius:50%;}
.hint-txt{font-size:11px;color:var(--txt3);text-align:center;margin-bottom:10px;}
.cta{width:100%;padding:15px;font-size:15px;font-weight:600;border:none;border-radius:var(--r-lg);background:var(--purple);color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.cta:disabled{background:var(--bg3);color:var(--txt3);}
.cta:active{opacity:0.82;}
.admin-bottom{background:var(--bg);padding:12px 16px 28px;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:var(--bg);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:20px 20px 36px;width:100%;max-width:430px;max-height:76vh;overflow-y:auto;}
.handle{width:38px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px;}
.sheet-title{font-size:17px;font-weight:600;color:var(--txt);margin-bottom:14px;}
.msg-box{font-size:14px;line-height:2.0;white-space:pre-wrap;color:var(--txt);background:var(--bg2);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;}
.sheet-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sb{padding:14px;border-radius:var(--r-md);border:0.5px solid var(--border2);background:var(--bg2);color:var(--txt);font-size:14px;font-weight:500;cursor:pointer;}
.sb.primary{background:var(--purple);color:#fff;border:none;}
.sb:active{opacity:0.78;}
.sb-full{width:100%;margin-top:8px;}

/* EDIT MODAL */
.edit-sheet{background:var(--bg);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:20px 20px 40px;width:100%;max-width:430px;}
.edit-sheet label{display:block;font-size:12px;font-weight:500;color:var(--txt2);margin-bottom:5px;margin-top:14px;}
.edit-sheet input{width:100%;font-size:15px;padding:11px 14px;border:0.5px solid var(--border2);border-radius:var(--r-md);background:var(--bg2);color:var(--txt);outline:none;}
.edit-sheet input:focus{border-color:var(--purple);}
.edit-sheet select{width:100%;font-size:15px;padding:11px 14px;border:0.5px solid var(--border2);border-radius:var(--r-md);background:var(--bg2);color:var(--txt);outline:none;}
.edit-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px;}
.empty{padding:60px 20px;text-align:center;color:var(--txt2);font-size:14px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="topbar-title">발주 체크 <span style="font-size:14px;font-weight:400;color:var(--txt2);">본점</span></div>
    <div class="topbar-sub">La Terrasse · 웨스턴돔</div>
    <div class="prog-row">
      <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
      <div class="prog-lbl" id="pl">0 / 0</div>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tbtab on" onclick="switchTab('check')">체크</div>
    <div class="tbtab" onclick="switchTab('admin')">품목 관리</div>
  </div>

  <!-- CHECK PANEL -->
  <div class="panel on" id="panel-check">
    <div class="stat-row">
      <div class="stat-cell"><div class="stat-n red" id="sN">0</div><div class="stat-l">발주 필요</div></div>
      <div class="stat-cell"><div class="stat-n" id="sO">0</div><div class="stat-l">확인 완료</div></div>
      <div class="stat-cell"><div class="stat-n" id="sL">0</div><div class="stat-l">미확인</div></div>
    </div>
    <div class="chips" id="chips"></div>
    <div id="content"></div>
    <div class="bottom">
      <div class="hint-row">
        <div class="hint-item"><div class="hint-dot" style="border:1.5px solid #bbb;"></div>미확인</div>
        <div class="hint-item"><div class="hint-dot" style="background:var(--red);"></div>발주 필요</div>
        <div class="hint-item"><div class="hint-dot" style="background:var(--green);"></div>확인 완료</div>
      </div>
      <div class="hint-txt">탭 → 발주 필요 &nbsp;·&nbsp; 길게 누르기 → 확인 완료</div>
      <button class="cta" id="cta" disabled onclick="openSheet()">발주 목록 공유</button>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="panel" id="panel-admin">
    <div class="admin-zone-tabs" id="adminZoneTabs"></div>
    <div class="admin-add-bar">
      <input id="newName" placeholder="품목명" />
      <input id="newHint" placeholder="발주 기준" style="flex:1.2"/>
      <button class="add-btn" onclick="addItem()">추가</button>
    </div>
    <div id="adminList"></div>
    <div class="admin-bottom"></div>
  </div>
</div>

<!-- SHARE SHEET -->
<div class="overlay" id="ov" onclick="if(event.target===this)closeSheet()">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">발주 목록</div>
    <div class="msg-box" id="msg"></div>
    <div class="sheet-btns">
      <button class="sb" id="cpBtn" onclick="doCopy()">복사</button>
      <button class="sb primary" onclick="doKakao()">카카오톡</button>
    </div>
    <button class="sb sb-full" onclick="closeSheet()">닫기</button>
  </div>
</div>

<!-- EDIT SHEET -->
<div class="overlay" id="editOv" onclick="if(event.target===this)closeEdit()">
  <div class="edit-sheet">
    <div class="handle"></div>
    <div class="sheet-title">품목 수정</div>
    <label>품목명</label>
    <input id="editName" />
    <label>발주 기준</label>
    <input id="editHint" />
    <label>평균 발주량</label>
    <input id="editAvg" />
    <label>구역</label>
    <select id="editZone"></select>
    <div class="edit-actions">
      <button class="sb" onclick="closeEdit()">취소</button>
      <button class="sb primary" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

// ── STATE ──────────────────────────────────────────────
const LS_ITEMS = 'lt_bonjeom_items';
const LS_ZONES = 'lt_bonjeom_zones';

function loadItems(){
  try{ const d=localStorage.getItem(LS_ITEMS); return d?JSON.parse(d):JSON.parse(JSON.stringify(DEFAULT_ITEMS)); }catch(e){ return JSON.parse(JSON.stringify(DEFAULT_ITEMS)); }
}
function loadZones(){
  try{ const d=localStorage.getItem(LS_ZONES); return d?JSON.parse(d):JSON.parse(JSON.stringify(DEFAULT_ZONES)); }catch(e){ return JSON.parse(JSON.stringify(DEFAULT_ZONES)); }
}
function saveItems(){ localStorage.setItem(LS_ITEMS, JSON.stringify(ITEMS)); }
function saveZones(){ localStorage.setItem(LS_ZONES, JSON.stringify(ZONES)); }

let ZONES=loadZones();
let ITEMS=loadItems();
let st={};
ITEMS.forEach(i=>st[i.id]={s:null,q:1});

let az="all", sn=false;
let pressTimer=null, touchStartX=0, touchStartY=0, touchMoved=false;
let activeTab="check";
let adminZone=ZONES[0]?.id||"";
let editingId=null;

function today(){
  const d=new Date(),w=["일","월","화","수","목","금","토"];
  return `${d.getMonth()+1}/${d.getDate()}(${w[d.getDay()]})`;
}
function getUnit(avg){
  if(!avg||avg==="-") return "개";
  const m=avg.match(/[가-힣]+/g);
  return m?m[m.length-1]:"개";
}
function nextId(){ return ITEMS.length>0?Math.max(...ITEMS.map(i=>i.id))+1:1; }

// ── TAB ───────────────────────────────────────────────
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tbtab').forEach((t,i)=>t.classList.toggle('on',['check','admin'][i]===tab));
  document.getElementById('panel-check').classList.toggle('on',tab==='check');
  document.getElementById('panel-admin').classList.toggle('on',tab==='admin');
  if(tab==='admin') renderAdmin();
}

// ── CHECK ─────────────────────────────────────────────
function needCnt(z){ return ITEMS.filter(i=>(z==="all"||i.z===z)&&st[i.id]&&st[i.id].s==="need").length; }

function sync(){
  const need=ITEMS.filter(i=>st[i.id]&&st[i.id].s==="need").length;
  const ok=ITEMS.filter(i=>st[i.id]&&st[i.id].s==="ok").length;
  document.getElementById("sN").textContent=need;
  document.getElementById("sO").textContent=ok;
  document.getElementById("sL").textContent=ITEMS.length-need-ok;
  const pct=Math.round((need+ok)/ITEMS.length*100);
  document.getElementById("pf").style.width=pct+"%";
  document.getElementById("pl").textContent=`${need+ok} / ${ITEMS.length}`;
  document.getElementById("cta").disabled=need===0;
}

function tap(id){
  if(!st[id]) st[id]={s:null,q:1};
  const s=st[id];
  if(s.s==="need"){s.s=null;s.q=1;}
  else if(s.s==="ok"){s.s="need";s.q=1;}
  else s.s="need";
  sync();renderChips();renderContent();
}
function longPress(id){
  if(!st[id]) st[id]={s:null,q:1};
  const s=st[id];
  s.s=s.s==="ok"?null:"ok"; s.q=1;
  if(navigator.vibrate) navigator.vibrate(30);
  sync();renderChips();renderContent();
}
function changeQ(e,id,d){
  e.stopPropagation();
  if(!st[id]) st[id]={s:"need",q:1};
  st[id].q=Math.max(1,st[id].q+d);
  const el=document.getElementById("qv"+id);
  if(el) el.textContent=st[id].q;
}

function getFilt(){
  return ITEMS.filter(i=>{
    if(az!=="all"&&i.z!==az) return false;
    if(sn&&(!st[i.id]||st[i.id].s!=="need")) return false;
    return true;
  });
}

function renderChips(){
  const nc=needCnt("all");
  document.getElementById("chips").innerHTML=
    `<span class="chip${az==="all"?" on":""}" onclick="setZ('all')">전체${nc>0?`<span class="nc">${nc}</span>`:""}</span>`+
    ZONES.map(z=>{
      const n=needCnt(z.id);
      return `<span class="chip${az===z.id?" on":""}" onclick="setZ('${z.id}')">${z.label}${n>0?`<span class="nc">${n}</span>`:""}</span>`;
    }).join("")+
    `<span class="chip${sn?" alert-on":""}" onclick="toggleSN()">발주만</span>`+
    `<span class="chip" onclick="doReset()">초기화</span>`;
}
function setZ(z){az=z;renderChips();renderContent();}
function toggleSN(){sn=!sn;renderChips();renderContent();}
function doReset(){ITEMS.forEach(i=>st[i.id]={s:null,q:1});sn=false;sync();renderChips();renderContent();}

function renderContent(){
  const items=getFilt();
  const el=document.getElementById("content");
  if(!items.length){el.innerHTML=`<div class="empty">해당 품목 없음</div>`;return;}
  const groups={};
  items.forEach(i=>{if(!groups[i.z])groups[i.z]=[];groups[i.z].push(i);});
  el.innerHTML=ZONES.filter(z=>groups[z.id]).map(z=>{
    const its=groups[z.id];
    const nc=its.filter(i=>st[i.id]&&st[i.id].s==="need").length;
    return `<div class="sec">
      ${az==="all"?`<div class="sec-head">
        <span class="sec-title">${z.label}</span>
        <span>${nc>0?`<span class="sec-need">발주 ${nc}&nbsp;</span>`:""}<span class="sec-meta">${its.length}개</span></span>
      </div>`:""}
      ${its.map(i=>{
        if(!st[i.id]) st[i.id]={s:null,q:1};
        const s=st[i.id]; const isNeed=s.s==="need"; const isOk=s.s==="ok";
        return `<div class="row${isOk?" is-ok":""}"
          onmousedown="startPress(${i.id},event)" onmouseup="endPress(${i.id})" onmouseleave="cancelPress()"
          ontouchstart="startPress(${i.id},event)" ontouchmove="movePress(event)" ontouchend="endPress(${i.id})" ontouchcancel="cancelPress()">
          <div class="row-main">
            <div class="row-info">
              <div class="row-name">${i.name}</div>
              <div class="row-hint">${i.hint}${i.avg&&i.avg!=="-"?` · 평균 ${i.avg}`:""}</div>
            </div>
            <div class="dot${isNeed?" need":isOk?" ok":""}"></div>
          </div>
          <div class="qty-expand${isNeed?" open":""}">
            <div class="qty-inner">
              <span class="qty-avg">${i.avg&&i.avg!=="-"?`평균 ${i.avg}`:""}</span>
              <div class="qty-ctrl">
                <button class="qty-btn" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="changeQ(event,${i.id},-1)">−</button>
                <span class="qty-val" id="qv${i.id}">${s.q}</span>
                <button class="qty-btn" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="changeQ(event,${i.id},1)">+</button>
              </div>
            </div>
          </div>
        </div>`;
      }).join("")}
    </div>`;
  }).join("");
}

function startPress(id,e){
  cancelPress(); touchMoved=false;
  const t=e.touches?e.touches[0]:e;
  touchStartX=t.clientX; touchStartY=t.clientY;
  pressTimer=setTimeout(()=>{if(!touchMoved){pressTimer=null;longPress(id);}},500);
}
function movePress(e){
  if(!pressTimer) return;
  const t=e.touches?e.touches[0]:e;
  if(Math.abs(t.clientX-touchStartX)>6||Math.abs(t.clientY-touchStartY)>6){touchMoved=true;cancelPress();}
}
function endPress(id){if(pressTimer&&!touchMoved){clearTimeout(pressTimer);pressTimer=null;tap(id);}else cancelPress();}
function cancelPress(){if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}}

// ── SHARE ─────────────────────────────────────────────
function buildMsg(){
  const need=ITEMS.filter(i=>st[i.id]&&st[i.id].s==="need");
  const byZone={};
  need.forEach(i=>{if(!byZone[i.z])byZone[i.z]=[];byZone[i.z].push(i);});
  let msg=`[La Terrasse 본점 발주 요청]\n${today()}\n`;
  ZONES.filter(z=>byZone[z.id]).forEach(z=>{
    msg+=`\n▪ ${z.label}\n`;
    byZone[z.id].forEach(i=>msg+=`· ${i.name} ${st[i.id].q}${getUnit(i.avg)}\n`);
  });
  msg+=`\n총 ${need.length}개 품목 발주 확인 부탁드립니다.`;
  return msg;
}
function openSheet(){document.getElementById("msg").textContent=buildMsg();document.getElementById("cpBtn").textContent="복사";document.getElementById("ov").classList.add("open");}
function closeSheet(){document.getElementById("ov").classList.remove("open");}
function doCopy(){navigator.clipboard.writeText(document.getElementById("msg").textContent).then(()=>{const b=document.getElementById("cpBtn");b.textContent="복사됨!";setTimeout(()=>b.textContent="복사",1500);});}
function doKakao(){const t=document.getElementById("msg").textContent;window.location.href=`kakaotalk://msg/send?text=${encodeURIComponent(t)}`;setTimeout(()=>navigator.clipboard.writeText(t),400);}

// ── ADMIN ─────────────────────────────────────────────
function renderAdmin(){
  // zone tabs
  document.getElementById("adminZoneTabs").innerHTML=
    ZONES.map(z=>`<span class="azt${adminZone===z.id?" on":""}" onclick="setAdminZone('${z.id}')">${z.label}</span>`).join("");
  // list
  const items=ITEMS.filter(i=>i.z===adminZone);
  document.getElementById("adminList").innerHTML=items.length?
    items.map(i=>`
      <div class="admin-item">
        <div class="admin-item-info">
          <div class="admin-item-name">${i.name}</div>
          <div class="admin-item-hint">${i.hint}${i.avg&&i.avg!=="-"?` · 평균 ${i.avg}`:""}</div>
        </div>
        <div class="admin-actions">
          <button class="a-btn" onclick="openEdit(${i.id})">수정</button>
          <button class="a-btn del" onclick="deleteItem(${i.id})">삭제</button>
        </div>
      </div>`).join(""):
    `<div class="empty">이 구역에 품목이 없어요</div>`;
}

function setAdminZone(z){adminZone=z;renderAdmin();}

function addItem(){
  const name=document.getElementById("newName").value.trim();
  const hint=document.getElementById("newHint").value.trim();
  if(!name) return;
  const id=nextId();
  ITEMS.push({id,z:adminZone,name,hint:hint||"소진 시",avg:"-",u:false});
  st[id]={s:null,q:1};
  saveItems();
  document.getElementById("newName").value="";
  document.getElementById("newHint").value="";
  renderAdmin();sync();renderChips();renderContent();
}

function deleteItem(id){
  if(!confirm(`"${ITEMS.find(i=>i.id===id)?.name}" 품목을 삭제할까요?`)) return;
  ITEMS.splice(ITEMS.findIndex(i=>i.id===id),1);
  delete st[id];
  saveItems();
  renderAdmin();sync();renderChips();renderContent();
}

function openEdit(id){
  editingId=id;
  const item=ITEMS.find(i=>i.id===id);
  document.getElementById("editName").value=item.name;
  document.getElementById("editHint").value=item.hint;
  document.getElementById("editAvg").value=item.avg||"-";
  const sel=document.getElementById("editZone");
  sel.innerHTML=ZONES.map(z=>`<option value="${z.id}"${z.id===item.z?" selected":""}>${z.label}</option>`).join("");
  document.getElementById("editOv").classList.add("open");
}
function closeEdit(){document.getElementById("editOv").classList.remove("open");editingId=null;}
function saveEdit(){
  const item=ITEMS.find(i=>i.id===editingId);
  if(!item) return;
  item.name=document.getElementById("editName").value.trim()||item.name;
  item.hint=document.getElementById("editHint").value.trim()||item.hint;
  item.avg=document.getElementById("editAvg").value.trim()||"-";
  item.z=document.getElementById("editZone").value;
  saveItems();
  closeEdit();
  renderAdmin();sync();renderChips();renderContent();
}

// ── INIT ──────────────────────────────────────────────
renderChips();renderContent();sync();
document.getElementById("sub").textContent="본점 · 웨스턴돔 · "+today();
